# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json
#
# End-to-end orchestration workflows.
# Run with:  atmos workflow deploy-cluster -f cluster

workflows:
  deploy-cluster:
    description: "Provision VMs, install HA k3s + kube-vip, then deploy Cilium and Kyverno."
    steps:
      - name: provision-vms
        command: terraform apply proxmox-vms -s prod -auto-approve
      - name: wait-for-ssh
        type: shell
        command: |
          echo "Waiting 60s for cloud-init / SSH on the new VMs..."
          sleep 60
      - name: install-k3s
        command: ansible playbook k3s -s prod
      - name: deploy-cilium
        command: helmfile apply cilium -s prod
      - name: deploy-kyverno
        # --skip-diff-on-install: the kyverno-policies chart renders ClusterPolicy
        # CRs whose CRDs are installed by the kyverno chart in the same apply.
        # `helmfile apply` diffs all releases before installing, so without this
        # the kyverno-policies diff fails with "no matches for kind ClusterPolicy".
        command: helmfile apply kyverno -s prod -- --skip-diff-on-install
      - name: deploy-filament-app
        # Requires the `filament` namespace and `filament-db` Secret to exist
        # (see README). --skip-diff-on-install avoids diffing Cilium/Gateway CRs
        # whose CRDs were installed by earlier steps.
        command: helmfile apply filament-app -s prod -- --skip-diff-on-install
      - name: deploy-hubble-ui
        # Reuses the LB IP pool + L2 announcement policy from filament-app, so
        # this must come after it.
        command: helmfile apply hubble-ui -s prod -- --skip-diff-on-install

  setup-gpu-os:
    description: "Bare-metal GPU host bring-up via Ansible only (no Terraform): common OS prep, passwordless sudo, NVIDIA driver check, nvidia-container-toolkit, then join k3s. Scoped to the k3s_gpu group."
    steps:
      # --limit k3s_gpu scopes every play to the GPU node: Common OS prep, the
      # GPU host role, and the agent join all run; the server/kube-vip/kubeconfig
      # plays have no hosts under the limit and are skipped. This is the ansible
      # analogue of `deploy-cluster` (which uses Terraform to build the VM OS).
      #
      # First-time bring-up on a host without passwordless sudo: append
      # `--ask-become-pass` here once (see roles/gpu tasks).
      - name: prepare-gpu-host
        command: ansible playbook k3s -s prod -- --limit k3s_gpu

  deploy-gpu:
    description: "Join the bare-metal GPU node (tainted agent), install the NVIDIA GPU Operator, then deploy vLLM."
    steps:
      # Idempotent full playbook: joins/labels/taints the GPU agent. The k3s
      # install tasks are guarded by `creates:` so existing nodes are untouched.
      - name: join-gpu-node
        command: ansible playbook k3s -s prod
      - name: deploy-gpu-operator
        # --skip-diff-on-install: the operator installs its own CRDs
        # (ClusterPolicy/NodeFeatureDiscovery) in the same apply.
        command: helmfile apply gpu-operator -s prod -- --skip-diff-on-install
      - name: deploy-vllm
        command: helmfile apply vllm -s prod -- --skip-diff-on-install

  deploy-rag:
    description: "GitOps RAG platform: enable GPU time-slicing, bootstrap Argo CD, then let it sync Open WebUI + Qdrant + embeddings + monitoring."
    steps:
      # Re-apply gpu-operator (time-slicing) + vLLM (lowered VRAM) so the GPU is
      # shareable before the embeddings pod also claims a slice.
      - name: apply-gpu-timeslicing
        command: helmfile apply gpu-operator -s prod -- --skip-diff-on-install
      - name: reapply-vllm
        command: helmfile apply vllm -s prod -- --skip-diff-on-install
      - name: bootstrap-argocd
        command: helmfile apply argocd -s prod -- --skip-diff-on-install
      - name: apply-root-app
        # Hands control to Argo CD: it reconciles everything under gitops/apps/.
        # NOTE: for a private repo, register repo credentials in Argo CD first
        # (see README) or make the repo public.
        type: shell
        command: |
          KUBECONFIG="${HOME}/.kube/atmos-k3s.yaml" kubectl apply -f gitops/root-app.yaml

  destroy-cluster:
    description: "Tear down the cluster in reverse order (removes the VMs)."
    steps:
      - name: destroy-rag-apps
        # Deleting the root Application cascades (via finalizer) to the RAG +
        # monitoring apps Argo manages. Best-effort.
        type: shell
        command: |
          KUBECONFIG="${HOME}/.kube/atmos-k3s.yaml" kubectl delete -f gitops/root-app.yaml --ignore-not-found --wait=false || true
      - name: destroy-argocd
        command: helmfile destroy argocd -s prod
        # Best-effort: the cluster may already be gone.
      - name: destroy-vllm
        command: helmfile destroy vllm -s prod
        # Best-effort: the cluster may already be gone.
      - name: destroy-gpu-operator
        command: helmfile destroy gpu-operator -s prod
        # Best-effort: the cluster may already be gone.
      - name: destroy-hubble-ui
        command: helmfile destroy hubble-ui -s prod
        # Best-effort: the cluster may already be gone.
      - name: destroy-filament-app
        command: helmfile destroy filament-app -s prod
        # Best-effort: the cluster may already be gone.
      - name: destroy-kyverno
        command: helmfile destroy kyverno -s prod
      - name: destroy-cilium
        command: helmfile destroy cilium -s prod
      - name: destroy-vms
        command: terraform destroy proxmox-vms -s prod -auto-approve

  deploy-app:
    description: "Deploy/redeploy just the filament tracker app (namespace + filament-db secret must exist)."
    steps:
      - name: deploy-filament-app
        command: helmfile apply filament-app -s prod -- --skip-diff-on-install

  plan-vms:
    description: "Plan the Proxmox VM changes only."
    steps:
      - name: plan
        command: terraform plan proxmox-vms -s prod
