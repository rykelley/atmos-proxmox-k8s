# yaml-language-server: $schema=https://atmos.tools/schemas/atmos/atmos-manifest/1.0/atmos-manifest.json
#
# Single source of truth for the cluster. Imported by the deploy stack.
# Vars are scoped per component so each tool receives only what it needs
# (this keeps `atmos terraform` free of undeclared-variable warnings).
#
# Edit THIS file to adapt the cluster to your environment. The node IPs here
# must match components/ansible/k3s/inventory/hosts.yml.

components:
  terraform:
    proxmox-vms:
      metadata:
        component: proxmox-vms
      vars:
        # --- Proxmox ---
        target_node: "pve1"
        template_name: "ubuntu-2404-cloudinit"
        template_id: 0
        datastore_id: "local-lvm"
        snippets_datastore_id: "local"
        ci_user: "ubuntu"
        ssh_public_keys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAIvPLEv5/P7zGc833XvRZSc5C4kEIIN0sMzcumHfeR1 rykelley@Ryans-MBP.localdomain"

        # --- Network (control-plane bridged on 10.10.1.0/24) ---
        bridge: "vmbr0"
        vlan_id: 0
        gateway: "10.10.1.1"
        netmask: 24
        dns_servers:
          - "1.1.1.1"
          - "8.8.8.8"
        dns_domain: "lan"

        vm_defaults:
          cores: 2
          sockets: 1
          memory: 4096
          disk_size: 40
          cpu_type: "host"
          os_type: "l26"
          started: true
          on_boot: true
          agent: true

        # --- Nodes (3 servers + 3 agents) ---
        nodes:
          k3s-server-1: { role: "server", ip: "10.10.1.31", vmid: 8101 }
          k3s-server-2: { role: "server", ip: "10.10.1.32", vmid: 8102 }
          k3s-server-3: { role: "server", ip: "10.10.1.33", vmid: 8103 }
          k3s-agent-1: { role: "agent", ip: "10.10.1.34", vmid: 8201 }
          k3s-agent-2: { role: "agent", ip: "10.10.1.35", vmid: 8202 }
          k3s-agent-3: { role: "agent", ip: "10.10.1.36", vmid: 8203 }

  ansible:
    k3s:
      metadata:
        component: k3s
      settings:
        ansible:
          playbook: site.yml
          inventory: inventory/hosts.yml
        depends_on:
          1:
            component: proxmox-vms
      env:
        ANSIBLE_HOST_KEY_CHECKING: "false"
        ANSIBLE_FORCE_COLOR: "true"
      vars:
        k3s_version: "v1.36.2+k3s1"
        kube_vip_version: "v0.8.7"
        kube_vip_interface: "eth0"
        control_plane_vip: "10.10.1.30"
        api_port: 6443
        pod_cidr: "10.42.0.0/16"
        service_cidr: "10.43.0.0/16"
        cluster_dns: "10.43.0.10"

  helmfile:
    cilium:
      metadata:
        component: cilium
      settings:
        depends_on:
          1:
            component: k3s
      env:
        KUBECONFIG: '{{ env "HOME" }}/.kube/atmos-k3s.yaml'
      vars:
        cilium_chart_version: "1.16.5"
        control_plane_vip: "10.10.1.30"
        api_port: 6443
        pod_cidr: "10.42.0.0/16"
        # North-south ingress + bare-metal LoadBalancer for the filament app.
        enable_gateway_api: true
        enable_l2_announcements: true
        k8s_client_qps: 15
        k8s_client_burst: 20
        gateway_api_crds_url: "https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/experimental-install.yaml"

    argocd:
      metadata:
        component: argocd
      settings:
        depends_on:
          1:
            component: cilium
      env:
        KUBECONFIG: '{{ env "HOME" }}/.kube/atmos-k3s.yaml'
      vars:
        argocd_namespace: "argocd"
        argocd_chart_version: "10.1.4"
        # Argo CD web UI on a dedicated Cilium L2 LoadBalancer IP.
        argocd_lb_ip: "10.10.1.244"
        argocd_lb_interface: "eth0"

    gpu-operator:
      metadata:
        component: gpu-operator
      settings:
        depends_on:
          1:
            component: cilium
      env:
        KUBECONFIG: '{{ env "HOME" }}/.kube/atmos-k3s.yaml'
      vars:
        gpu_operator_namespace: "gpu-operator"
        # v26.x bundles container-toolkit >= v1.18 which supports containerd
        # config version 3 (used by k3s v1.32+/containerd 2.x). Older toolkits
        # crash with "unsupported config version: 3".
        gpu_operator_chart_version: "v26.3.3"
        # Host driver is pre-installed on the Blackwell node, so the operator
        # only manages the toolkit + device plugin (driver.enabled=false in the
        # helmfile). DCGM exporter ships GPU metrics for observability.
        gpu_operator_dcgm_enabled: true
        # Time-slicing: advertise the single GPU as N logical devices so the
        # chat LLM and the embeddings model can co-schedule on it. Shares (does
        # not partition) VRAM, so keep the sum of model footprints under total.
        gpu_timeslicing_enabled: true
        gpu_timeslicing_replicas: 4

    vllm:
      metadata:
        component: vllm
      settings:
        depends_on:
          1:
            component: gpu-operator
      env:
        KUBECONFIG: '{{ env "HOME" }}/.kube/atmos-k3s.yaml'
      vars:
        vllm_namespace: "vllm"
        # Recent vllm/vllm-openai tag with the CUDA 12.8 build required for
        # Blackwell (sm_120). Bump as newer releases land.
        vllm_image_tag: "v0.11.0"
        # Ungated small model that fits comfortably on the RTX 2000 Blackwell.
        # Drop to Qwen/Qwen2.5-1.5B-Instruct if VRAM is tight.
        vllm_model: "Qwen/Qwen2.5-3B-Instruct"
        vllm_max_model_len: 8192
        # Leave VRAM headroom for the time-sliced embeddings model on the same
        # GPU (time-slicing shares memory). Raise toward 0.9 if vLLM runs alone.
        vllm_gpu_memory_utilization: "0.55"
        # OpenAI-compatible API served on a dedicated Cilium L2 LoadBalancer IP,
        # clear of the filament gateway (.240) and Hubble UI (.241).
        vllm_lb_ip: "10.10.1.242"
        vllm_lb_interface: "eth0"
        # Persist the HuggingFace model cache across pod restarts (0 = emptyDir).
        vllm_model_cache_size: "30Gi"
        # Optional: name of a pre-created Secret with a HF_TOKEN key for gated
        # models. Leave "" for ungated models like Qwen.
        vllm_hf_token_secret: ""

    hubble-ui:
      metadata:
        component: hubble-ui
      settings:
        depends_on:
          1:
            component: cilium
          # The shared LB IP pool + L2 announcement policy live in the
          # filament-app chart, so that must be applied first.
          2:
            component: filament-app
      env:
        KUBECONFIG: '{{ env "HOME" }}/.kube/atmos-k3s.yaml'
      vars:
        # --- Cilium Gateway L2 LoadBalancer (Hubble UI observability) ---
        hubble_gateway_hostname: ""
        hubble_lb_ip: "10.10.1.241"

    kyverno:
      metadata:
        component: kyverno
      settings:
        depends_on:
          1:
            component: cilium
      env:
        KUBECONFIG: '{{ env "HOME" }}/.kube/atmos-k3s.yaml'
      vars:
        kyverno_chart_version: "3.3.4"
        kyverno_policies_chart_version: "3.3.4"
        kyverno_replicas: 3
        kyverno_validation_action: "Audit"
        # Custom policies enforced on the filament application namespace.
        filament_namespace: "filament"
        filament_validation_action: "Enforce"

    filament-app:
      metadata:
        component: filament-app
      settings:
        depends_on:
          1:
            component: kyverno
      env:
        KUBECONFIG: '{{ env "HOME" }}/.kube/atmos-k3s.yaml'
      vars:
        filament_namespace: "filament"
        # --- Images (GHCR). Set image_owner to your GitHub org/user and pin
        # image_tag to a built git SHA (the CI workflow pushes both sha + latest). ---
        image_registry: "ghcr.io"
        image_owner: "rykelley"
        # Release tag pushed by CI (env.IMAGE_VERSION). Kyverno blocks ":latest",
        # so we pin an explicit version.
        image_tag: "v1.0.0"
        # NAME of a docker-registry Secret in the filament namespace (see below).
        # Leave "" if you make the GHCR packages public.
        image_pull_secret: "ghcr"
        # --- Database secret (create out-of-band, see README) ---
        db_secret_name: "filament-db"
        db_secret_key: "DATABASE_URL"
        # --- Cilium Gateway L2 LoadBalancer ---
        gateway_hostname: ""
        gateway_lb_ip: "10.10.1.240"
        # Only the two Gateway services live here (filament .240, hubble-ui .241).
        # Keep this block narrow: dedicated single-IP pools own .242 (vLLM),
        # .243 (open-webui), .244 (argocd) and .245 (grafana). Cilium flags pools
        # whose IP ranges OVERLAP as conflicting (regardless of serviceSelector),
        # so a wide .240-.250 block here would disable those dedicated pools.
        gateway_lb_start: "10.10.1.240"
        gateway_lb_stop: "10.10.1.241"
        gateway_interface: "eth0"
        # --- Network policy ---
        network_policy_enabled: true
        # Supabase's direct host (db.<ref>.supabase.co) is IPv6-only, which the
        # IPv4 pod network can't reach. Use the connection pooler (IPv4) on 6543.
        supabase_port: 6543
