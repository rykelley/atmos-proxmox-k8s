# Hubble UI runs in kube-system (installed by the cilium chart); this chart
# only adds a Gateway API Gateway + HTTPRoute so it's reachable on the LAN.
namespace: kube-system

hubbleUi:
  serviceName: hubble-ui
  servicePort: 80

gateway:
  name: hubble-ui
  className: cilium
  # Leave "" to match any Host header; set to route by hostname instead.
  hostname: ""

# Reuses the filament-app's CiliumLoadBalancerIPPool / CiliumL2AnnouncementPolicy,
# which select any Service Cilium creates for a Gateway (cluster-scoped, not
# namespace-scoped) - no separate pool/policy needed here.
loadBalancer:
  ip: "10.10.1.241"
