apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: hubble-ui-gateway
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: Helm
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  # Cilium copies this onto the LoadBalancer Service it generates for the
  # Gateway, so LB-IPAM assigns this specific address from the shared pool.
  infrastructure:
    annotations:
      io.cilium/lb-ipam-ips: {{ .Values.loadBalancer.ip | quote }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
      {{- with .Values.gateway.hostname }}
      hostname: {{ . | quote }}
      {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: hubble-ui-gateway
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  {{- with .Values.gateway.hostname }}
  hostnames:
    - {{ . | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.hubbleUi.serviceName }}
          port: {{ .Values.hubbleUi.servicePort }}
