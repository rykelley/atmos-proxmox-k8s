apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ft.labels" (dict "name" "filament-gateway" "component" "gateway" "root" $) | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  # Cilium copies these onto the LoadBalancer Service it generates for the
  # Gateway, so LB-IPAM assigns this specific address from the pool below.
  infrastructure:
    annotations:
      io.cilium/lb-ipam-ips: {{ .Values.loadBalancer.ip | quote }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
      {{- with .Values.gateway.hostname }}
      hostname: {{ . | quote }}
      {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: filament-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ft.labels" (dict "name" "filament-web-route" "component" "gateway" "root" $) | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  {{- with .Values.gateway.hostname }}
  hostnames:
    - {{ . | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web
          port: {{ .Values.web.port }}
