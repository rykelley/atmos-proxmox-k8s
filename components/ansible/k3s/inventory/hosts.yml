# Static inventory. IPs mirror stacks/catalog/cluster.yaml (the single source of
# truth). Atmos also passes the full `nodes` map via --extra-vars; this file is
# what drives play targeting (groups) and works for standalone ansible-playbook.
all:
  vars:
    ansible_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3
  children:
    k3s_cluster:
      children:
        k3s_servers:
          hosts:
            k3s-server-1:
              ansible_host: 10.10.1.31
              k3s_node_ip: 10.10.1.31
            k3s-server-2:
              ansible_host: 10.10.1.32
              k3s_node_ip: 10.10.1.32
            k3s-server-3:
              ansible_host: 10.10.1.33
              k3s_node_ip: 10.10.1.33
        k3s_agents:
          hosts:
            k3s-agent-1:
              ansible_host: 10.10.1.34
              k3s_node_ip: 10.10.1.34
            k3s-agent-2:
              ansible_host: 10.10.1.35
              k3s_node_ip: 10.10.1.35
            k3s-agent-3:
              ansible_host: 10.10.1.36
              k3s_node_ip: 10.10.1.36
          children:
            # Bare-metal GPU agent (NOT a Proxmox VM, so it is intentionally
            # absent from the Terraform `nodes:` map in stacks/catalog/cluster.yaml).
            # Tainted so only GPU workloads (vLLM, Ollama, ...) schedule here;
            # the NVIDIA GPU Operator's operands tolerate the nvidia.com/gpu taint.
            k3s_gpu:
              hosts:
                k3s-gpu-1:
                  ansible_host: 10.10.1.37
                  k3s_node_ip: 10.10.1.37
                  is_vm: false
                  k3s_node_labels:
                    - "nvidia.com/gpu.present=true"
                  k3s_node_taints:
                    - "nvidia.com/gpu=present:NoSchedule"
