---
- name: Wait for the control-plane VIP API to be reachable (joining servers only)
  ansible.builtin.wait_for:
    host: "{{ control_plane_vip }}"
    port: "{{ api_port }}"
    timeout: 300
  when: not (k3s_cluster_init | bool)

- name: Ensure /etc/rancher/k3s exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Render k3s server config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"
  register: _k3s_server_config

- name: Check whether k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: _k3s_bin

- name: Install k3s server
  ansible.builtin.shell:
    cmd: "curl -sfL {{ k3s_install_url }} | INSTALL_K3S_VERSION={{ k3s_version }} INSTALL_K3S_EXEC=server sh -"
  args:
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_SKIP_START: "false"

- name: Restart k3s when config changed on an already-installed node
  ansible.builtin.systemd:
    name: k3s
    state: restarted
  when:
    - _k3s_bin.stat.exists
    - _k3s_server_config.changed

- name: Ensure k3s server is enabled and running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for the Kubernetes API on this node
  ansible.builtin.wait_for:
    host: "{{ k3s_node_ip }}"
    port: "{{ api_port }}"
    timeout: 300

- name: Wait for kubeconfig to be written (bootstrap node)
  ansible.builtin.wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    timeout: 180
  when: k3s_cluster_init | bool
