---
- name: Ensure required APT packages are present
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - open-iscsi
      - nfs-common
      - apparmor
      - apparmor-utils
    state: present
    update_cache: true
    cache_valid_time: 3600

# qemu-guest-agent only makes sense on Proxmox VMs. Bare-metal nodes (e.g. the
# GPU box) set is_vm=false in inventory so this is skipped there.
- name: Ensure qemu-guest-agent is present on VMs
  ansible.builtin.apt:
    name: qemu-guest-agent
    state: present
  when: is_vm | default(true)

- name: Enable qemu-guest-agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started
  when: is_vm | default(true)

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Remove swap entries from /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Load required kernel modules now
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter

- name: Apply sysctl settings for Kubernetes networking
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-k3s.conf
    sysctl_set: true
    reload: true
  loop:
    - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { name: "net.ipv4.ip_forward", value: "1" }
    - { name: "net.ipv6.conf.all.forwarding", value: "1" }
    - { name: "fs.inotify.max_user_instances", value: "8192" }
    - { name: "fs.inotify.max_user_watches", value: "524288" }
