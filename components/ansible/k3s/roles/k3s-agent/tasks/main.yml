---
- name: Wait for the control-plane VIP API to be reachable
  ansible.builtin.wait_for:
    host: "{{ control_plane_vip }}"
    port: "{{ api_port }}"
    timeout: 300

- name: Ensure /etc/rancher/k3s exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Render k3s agent config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"
  register: _k3s_agent_config

- name: Check whether k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: _k3s_bin

- name: Install k3s agent
  ansible.builtin.shell:
    cmd: "curl -sfL {{ k3s_install_url }} | INSTALL_K3S_VERSION={{ k3s_version }} INSTALL_K3S_EXEC=agent sh -"
  args:
    creates: /usr/local/bin/k3s

- name: Restart k3s-agent when config changed on an already-installed node
  ansible.builtin.systemd:
    name: k3s-agent
    state: restarted
  when:
    - _k3s_bin.stat.exists
    - _k3s_agent_config.changed

- name: Ensure k3s-agent is enabled and running
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    state: started
