# Cilium LoadBalancer IPAM + L2 announcement for the GitOps-managed services.
# Cluster-scoped Cilium CRDs; each pool/policy targets one Service by its app
# label so the assignments stay independent (Argo CD, filament, Hubble, vLLM
# each own their own pool elsewhere).
#
# IP map on 10.10.1.0/24: .240 filament, .241 hubble, .242 vLLM, .243 open-webui,
# .244 argocd, .245 grafana.
---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: open-webui-lb-pool
spec:
  blocks:
    - start: "10.10.1.243"
      stop: "10.10.1.243"
  serviceSelector:
    matchLabels:
      app.kubernetes.io/name: open-webui
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: open-webui-lb-pool
spec:
  serviceSelector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  interfaces:
    # Match the LAN NIC on any elected announcer: Proxmox VMs use eth0, the
    # bare-metal GPU node (k3s-gpu1) uses eno1. Matching only eth0 would leave
    # the VIP unreachable if Cilium elected the GPU node as the announcer.
    - "^(eth0|eno1)$"
  loadBalancerIPs: true
---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: grafana-lb-pool
spec:
  blocks:
    - start: "10.10.1.245"
      stop: "10.10.1.245"
  serviceSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: grafana-lb-pool
spec:
  serviceSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  interfaces:
    # See open-webui above: match eth0 (VMs) or eno1 (bare-metal GPU node).
    - "^(eth0|eno1)$"
  loadBalancerIPs: true
