# Loki (monolithic/single-binary mode) - log storage + query engine.
# Filesystem storage on a small PVC; this is a homelab-scale log store, not
# built for high volume or long retention. Grafana Alloy (gitops/apps/alloy.yaml)
# ships every pod's logs here; Grafana (monitoring app) queries it via the
# "Loki" datasource at http://loki-gateway.monitoring.svc.cluster.local.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.1.0
    helm:
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          limits_config:
            allow_structured_metadata: true
            # Keep log storage bounded on a single node's disk.
            retention_period: 168h
          compactor:
            retention_enabled: true
            delete_request_store: filesystem
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            size: 10Gi
        # Zero out the other deployment targets - required by the chart's
        # validation when running in SingleBinary mode.
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0
        minio:
          enabled: false
        test:
          enabled: false
        lokiCanary:
          enabled: false
        # The chart's default chunksCache/resultsCache (memcached) sizing
        # (~10Gi memory request) is built for large multi-tenant Loki
        # deployments, not this single-node/filesystem homelab setup - it
        # can't schedule on these nodes. Disable both; Loki works fine
        # without them at this log volume, just slightly slower on repeat
        # queries.
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
