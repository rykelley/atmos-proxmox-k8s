# Grafana Alloy - ships every pod's logs cluster-wide to Loki.
# Runs as a DaemonSet and discovers pods via the Kubernetes API (no hostPath
# mount of /var/log needed - it reads container logs through the kubelet's
# pods/log API, which the chart's default ClusterRole already grants).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.10.1
    helm:
      values: |
        controller:
          type: daemonset
        alloy:
          configMap:
            content: |-
              logging {
                level  = "info"
                format = "logfmt"
              }

              discovery.kubernetes "pods" {
                role = "pod"
              }

              loki.source.kubernetes "pods" {
                targets    = discovery.kubernetes.pods.targets
                forward_to = [loki.write.endpoint.receiver]
              }

              loki.write "endpoint" {
                endpoint {
                  url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
                }
              }
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
