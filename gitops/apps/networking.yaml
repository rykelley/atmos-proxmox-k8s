# Cluster-scoped Cilium LoadBalancer pools + L2 policies for the RAG services.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-networking
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rykelley/atmos-proxmox-k8s.git
    targetRevision: main
    path: gitops/networking
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
