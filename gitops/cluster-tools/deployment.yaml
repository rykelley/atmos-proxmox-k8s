# cluster-tools: an OpenAPI tool server the LLM calls from Open WebUI.
# Plain python image + pip install at startup (homelab-simple, no image build
# pipeline needed); the app code is mounted from the ConfigMap. Runs on the
# regular worker nodes - no GPU, no special scheduling.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-tools
  namespace: rag
  labels:
    app.kubernetes.io/name: cluster-tools
    app.kubernetes.io/part-of: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-tools
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-tools
        app.kubernetes.io/part-of: rag
    spec:
      serviceAccountName: cluster-tools
      enableServiceLinks: false
      containers:
        - name: cluster-tools
          image: "python:3.12-slim"
          command: ["sh", "-c"]
          args:
            - |
              pip install --no-cache-dir --quiet "fastapi<1" "uvicorn<1" "httpx<1" && \
              exec uvicorn main:app --app-dir /app --host 0.0.0.0 --port 8000
          env:
            - name: PROMETHEUS_URL
              value: "http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
            - name: LOKI_URL
              value: "http://loki-gateway.monitoring.svc.cluster.local"
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: code
              mountPath: /app
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /openapi.json
              port: http
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /openapi.json
              port: http
            periodSeconds: 15
      volumes:
        - name: code
          configMap:
            name: cluster-tools-code
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-tools
  namespace: rag
  labels:
    app.kubernetes.io/name: cluster-tools
    app.kubernetes.io/part-of: rag
spec:
  selector:
    app.kubernetes.io/name: cluster-tools
  ports:
    - name: http
      port: 8000
      targetPort: http
